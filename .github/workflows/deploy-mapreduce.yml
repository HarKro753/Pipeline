name: Deploy MapReduce

on:
  push:
    branches:
      - main
    paths:
      - "mapreduce-ddd/**"
      - "k8s/staging/mapreduce.yaml"
      - "k8s/prod/mapreduce.yaml"
      - ".github/workflows/deploy-mapreduce.yml"
    tags:
      - "v*"

concurrency:
  group: deploy-mapreduce-${{ startsWith(github.ref, 'refs/tags/v') && 'prod' || 'staging' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: harkro123
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push (staging)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/build-push-action@v6
        with:
          context: mapreduce-ddd
          push: true
          tags: harkro123/pipeline-mapreduce:latest
          cache-from: type=gha,scope=mapreduce
          cache-to: type=gha,scope=mapreduce,mode=max

      - name: Build and push (prod)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/build-push-action@v6
        with:
          context: mapreduce-ddd
          push: true
          tags: |
            harkro123/pipeline-mapreduce:${{ github.ref_name }}
            harkro123/pipeline-mapreduce:latest
          cache-from: type=gha,scope=mapreduce
          cache-to: type=gha,scope=mapreduce,mode=max

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          kubectl config set-cluster nova --server=https://192.168.178.140:6443 --insecure-skip-tls-verify=true
          kubectl config set-credentials ci --token="${{ secrets.KUBE_TOKEN }}"
          kubectl config set-context nova --cluster=nova --user=ci --namespace=default
          kubectl config use-context nova

      - name: Deploy staging
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          kubectl apply -f k8s/staging/mapreduce.yaml

      - name: Deploy prod
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          TAG="${{ github.ref_name }}"
          sed -i "s|IMAGE_TAG|${TAG}|g" k8s/prod/mapreduce.yaml
          kubectl apply -f k8s/prod/mapreduce.yaml
